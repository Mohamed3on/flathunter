name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_ID: flathunters-384915
  REGION: europe-west1
  JOB_NAME: flathunter-job
  IMAGE: gcr.io/flathunters-384915/flathunter-job

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      - name: Build and push image
        run: |
          docker build -t "$IMAGE" -f Dockerfile.gcloud.job .
          docker push "$IMAGE"

      - name: Update config secret
        run: |
          printf '%s' "$CONFIG_YAML" | gcloud secrets versions add flathunter-config \
            --data-file=- --project "$PROJECT_ID" 2>/dev/null || \
          printf '%s' "$CONFIG_YAML" | gcloud secrets create flathunter-config \
            --data-file=- --project "$PROJECT_ID"
        env:
          CONFIG_YAML: ${{ secrets.CONFIG_YAML }}

      - name: Deploy Cloud Run Job
        run: |
          gcloud run jobs update "$JOB_NAME" \
            --image "$IMAGE" \
            --region "$REGION" \
            --project "$PROJECT_ID" \
            --memory 2Gi \
            --cpu 1 \
            --task-timeout 600 \
            --max-retries 0 \
            --set-secrets="/config/config.yaml=flathunter-config:latest" 2>/dev/null || \
          gcloud run jobs create "$JOB_NAME" \
            --image "$IMAGE" \
            --region "$REGION" \
            --project "$PROJECT_ID" \
            --memory 2Gi \
            --cpu 1 \
            --task-timeout 600 \
            --max-retries 0 \
            --set-secrets="/config/config.yaml=flathunter-config:latest"

      - name: Ensure Cloud Scheduler trigger exists
        run: |
          gcloud scheduler jobs describe "${JOB_NAME}-trigger" \
            --location "$REGION" \
            --project "$PROJECT_ID" 2>/dev/null || \
          gcloud scheduler jobs create http "${JOB_NAME}-trigger" \
            --location "$REGION" \
            --project "$PROJECT_ID" \
            --schedule "*/10 * * * *" \
            --time-zone "Europe/Berlin" \
            --uri "https://${REGION}-run.googleapis.com/apis/run.googleapis.com/v1/namespaces/${PROJECT_ID}/jobs/${JOB_NAME}:run" \
            --http-method POST \
            --oauth-service-account-email "$SCHEDULER_SA_EMAIL"
        env:
          SCHEDULER_SA_EMAIL: ${{ secrets.GCP_SCHEDULER_SA_EMAIL }}
